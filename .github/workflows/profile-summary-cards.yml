name: Generate GitHub Profile Assets

on:
  # Run automatically every day at 12:00 AM UTC
  schedule:
    - cron: "0 0 * * *"

  # Allow manual execution from GitHub Actions
  workflow_dispatch:

permissions:
  contents: write

# Prevent multiple runs from modifying the profile simultaneously
concurrency:
  group: github-profile-assets
  cancel-in-progress: true

jobs:
  # =========================================================
  # 1. Generate GitHub Profile Summary Cards
  # =========================================================
  summary-cards:
    name: Generate Summary Cards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}

        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 2

          # Let this action commit its own generated cards
          AUTO_PUSH: true

          THEME: github_dark

          # Card animation
          ANIMATION: load
          DURATION: 3

  # =========================================================
  # 2. Generate Detailed GitHub Metrics
  # =========================================================
  metrics:
    name: Generate Detailed Metrics
    needs: summary-cards
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Complete account overview
      # -------------------------------------------------------
      - name: Generate GitHub account overview
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: update GitHub account overview"

          user: ${{ github.repository_owner }}
          filename: github-metrics.svg

          template: classic

          base: >-
            header,
            activity,
            community,
            repositories,
            metadata

          base_indepth: yes
          config_timezone: Africa/Cairo

      # -------------------------------------------------------
      # Full-year isometric contribution calendar
      # -------------------------------------------------------
      - name: Generate full-year contribution calendar
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: update contribution calendar"

          user: ${{ github.repository_owner }}
          filename: github-calendar.svg

          base: ""

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          config_timezone: Africa/Cairo

      # -------------------------------------------------------
      # Recent activity and coding habits
      # -------------------------------------------------------
      - name: Generate activity and coding habits
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: update GitHub activity"

          user: ${{ github.repository_owner }}
          filename: github-activity.svg

          base: ""

          # Recent GitHub activity
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: all
          plugin_activity_timestamps: yes
          plugin_activity_visibility: all

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes

          config_timezone: Africa/Cairo

      # -------------------------------------------------------
      # GitHub achievements
      # -------------------------------------------------------
      - name: Generate GitHub achievements
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: update GitHub achievements"

          user: ${{ github.repository_owner }}
          filename: github-achievements.svg

          base: ""

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes

  # =========================================================
  # 3. Generate and Commit Contribution Snake
  # =========================================================
  contribution-snake:
    name: Generate Contribution Snake
    needs: metrics
    runs-on: ubuntu-latest

    steps:
      # Checkout again after Metrics commits,
      # so this job gets the newest main branch
      - name: Checkout latest repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Create assets directory
        run: mkdir -p assets

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3

        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          outputs: |
            assets/github-snake.svg?palette=github-light
            assets/github-snake-dark.svg?palette=github-dark

      - name: Commit contribution snake
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/

          if git diff --cached --quiet; then
            echo "No snake changes to commit."
            exit 0
          fi

          git commit -m "chore: update contribution snake"

          # Retry safely if the remote branch changed
          git pull --rebase origin main
          git push origin HEAD:main
